<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archivo de los Sentires</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Marco 16:9 donde va toda la experiencia. -->
  <div class="game-frame">
  <div class="top-ui is-hidden" aria-label="Game controls">
    <button class="ui-icon-button" type="button" aria-label="Music">
      <img class="ui-button-box" src="assets/ui/Button_Box.png" alt="">
      <img class="ui-button-icon" src="assets/icons/Music.svg" alt="">
    </button>
    <button class="ui-icon-button exit-button" type="button" aria-label="Exit">
      <img class="ui-button-box" src="assets/ui/Button_Box.png" alt="">
      <img class="ui-button-icon" src="assets/icons/Exit_Door.svg" alt="">
    </button>
  </div>

  <main class="loading-screen is-hidden" aria-label="Loading">
    <img class="loading-icon" src="assets/icons/Loading_0.svg" alt="Loading">
  </main>

  <main class="entry-screen" aria-label="Archivo de los Sentires entry screen">
    <button class="image-button entry-logo-button" type="button" aria-label="Enter the archive">
      <img
        class="archive-image"
        src="assets/images/Entry/Logo.png"
        data-default-src="assets/images/Entry/Logo.png"
        data-hover-src="assets/images/Entry/Logo_hover.png"
        alt="Archivo de los Sentires"
      >
    </button>
  </main>

  <main class="hub-screen is-hidden" aria-label="Archivo de los Sentires hub">
    <div class="door-row">
      <button class="image-button door-button" type="button" data-room-target="lake" aria-label="Open lake room">
        <img class="archive-image" src="assets/images/Hub/Door.png" data-default-src="assets/images/Hub/Door.png" data-hover-src="assets/images/Hub/Door_hover.png" alt="">
      </button>
      <button class="image-button door-button" type="button" data-room-target="diner" aria-label="Open diner room">
        <img class="archive-image" src="assets/images/Hub/Door.png" data-default-src="assets/images/Hub/Door.png" data-hover-src="assets/images/Hub/Door_hover.png" alt="">
      </button>
      <button class="image-button door-button" type="button" data-room-target="billboards" aria-label="Open billboards room">
        <img class="archive-image" src="assets/images/Hub/Door.png" data-default-src="assets/images/Hub/Door.png" data-hover-src="assets/images/Hub/Door_hover.png" alt="">
      </button>
      <button class="image-button door-button" type="button" data-room-target="final" aria-label="Open final room">
        <img class="door-lock-icon" src="assets/icons/Lock.svg" alt="">
        <img class="archive-image" src="assets/images/Hub/Door.png" data-default-src="assets/images/Hub/Door.png" data-hover-src="assets/images/Hub/Door_hover.png" alt="">
      </button>
    </div>
    <div class="caption-box hub-caption is-hidden" aria-live="polite">
      <img class="caption-box-image" src="assets/ui/Caption_Box.png" alt="">
      <span>Elige un archivo.</span>
    </div>
  </main>

  <main class="room-screen is-hidden" data-room="billboards" aria-label="Billboards room">
    <div class="room-title">
      <img class="room-title-box" src="assets/ui/Title_Box.png" alt="">
      <span>Registro 03</span>
    </div>
    <img class="stars-frame stars-frame-one is-visible" src="assets/images/Billboards/Stars_1.png" alt="">
    <img class="stars-frame stars-frame-two" src="assets/images/Billboards/Stars_2.png" alt="">
    <img class="billboard-frame billboard-frame-one" src="assets/images/Billboards/Billboards_1_1.png" alt="">
    <img class="billboard-frame billboard-frame-two" src="assets/images/Billboards/Billboards_2_1.png" alt="">
    <img class="room-image" src="assets/images/Billboards/Billboards_room.png" alt="Billboards room">
    <img class="exit-light" src="assets/images/Billboards/Exit_light.png" alt="">
    <div class="caption-box caption-box-two billboard-caption is-hidden" aria-live="polite">
      <img class="caption-box-image" src="assets/ui/Caption_Box_2.png" alt="">
      <span></span>
      <button class="pixel-close-button caption-next-button" type="button" aria-label="Next caption"></button>
    </div>
    <div class="caption-box billboard-hint-caption is-hidden" aria-live="polite">
      <img class="caption-box-image" src="assets/ui/Caption_Box.png" alt="">
      <span></span>
    </div>
    <div class="text-box billboard-dialogue-box is-hidden" aria-live="polite">
      <img class="text-box-image" src="assets/ui/Text_Box.png" alt="">
      <span></span>
      <button class="pixel-close-button text-next-button" type="button" aria-label="Next dialogue"></button>
    </div>
    <button class="billboard-cat-button" type="button" aria-label="Inspect the cat">
      <img src="assets/images/Billboards/Cat_1.png" alt="">
    </button>
    <button class="billboard-tv-entry-button" type="button" aria-label="Inspect the old TV">
      <img src="assets/images/Billboards/TV.png" alt="">
    </button>
  </main>

  <main class="room-screen is-hidden" data-room="diner" aria-label="Rainy diner room">
    <div class="room-title">
      <img class="room-title-box" src="assets/ui/Title_Box.png" alt="">
      <span>Registro 02</span>
    </div>
    <img class="diner-back" src="assets/images/Diner/Back_1.png" alt="">
    <img class="diner-back" src="assets/images/Diner/Back_2.png" alt="">
    <img class="room-image" src="assets/images/Diner/Diner_room.png" alt="Rainy diner room">
    <img class="diner-rain diner-rain-one" src="assets/images/Diner/Rain_1.png" alt="">
    <img class="diner-rain diner-rain-two" src="assets/images/Diner/Rain_2.png" alt="">
    <img class="diner-rain diner-rain-three" src="assets/images/Diner/Rain_3.png" alt="">
    <img class="diner-light" src="assets/images/Diner/Light.png" alt="">
    <div class="diner-darkness" aria-hidden="true"></div>
    <div class="caption-box caption-box-two diner-caption is-hidden" aria-live="polite">
      <img class="caption-box-image" src="assets/ui/Caption_Box_2.png" alt="">
      <span></span>
      <div class="coffee-choice-buttons is-hidden">
        <button class="coffee-choice-button coffee-yes-button" type="button">sí</button>
        <button class="coffee-choice-button coffee-no-button" type="button">no</button>
      </div>
      <button class="pixel-close-button caption-next-button" type="button" aria-label="Next caption"></button>
    </div>
    <div class="caption-box diner-hint-caption is-hidden" aria-live="polite">
      <img class="caption-box-image" src="assets/ui/Caption_Box.png" alt="">
      <span></span>
    </div>
    <div class="text-box diner-dialogue-box is-hidden" aria-live="polite">
      <img class="text-box-image" src="assets/ui/Text_Box.png" alt="">
      <span></span>
      <button class="pixel-close-button text-next-button" type="button" aria-label="Next dialogue"></button>
    </div>
    <button class="diner-character-button is-hidden" type="button" aria-label="Speak to the diner guest">
      <img src="assets/images/Diner/Ghost.png" alt="">
    </button>
  </main>

  <div class="coffee-minigame is-hidden" aria-label="Coffee mini-game">
    <div class="coffee-window">
      <img class="coffee-backdrop" src="assets/images/Diner/Coffee_minigame/Backdrop_coffee.png" alt="">
      <img class="coffee-counter" src="assets/images/Diner/Coffee_minigame/Counter.png" alt="">
      <button class="coffee-item coffee-pot-button" type="button" aria-label="Pour coffee">
        <img class="coffee-pot-image" src="assets/images/Diner/Coffee_minigame/Pot_full.png" alt="">
      </button>
      <button class="coffee-item coffee-sugar-button" type="button" aria-label="Add sugar">
        <img class="coffee-sugar-image" src="assets/images/Diner/Coffee_minigame/Sugar_full.png" alt="">
      </button>
      <img class="coffee-cup-image" src="assets/images/Diner/Coffee_minigame/Cup_empty.png" alt="">
    </div>
    <div class="caption-box coffee-exit-hint is-hidden" aria-live="polite">
      <img class="caption-box-image" src="assets/ui/Caption_Box.png" alt="">
      <span>Pulsa fuera para cerrar el minijuego.</span>
    </div>
  </div>

  <main class="room-screen is-hidden" data-room="lake" aria-label="Calm lake room">
    <div class="room-title">
      <img class="room-title-box" src="assets/ui/Title_Box.png" alt="">
      <span>Registro 01</span>
    </div>
    <img class="room-image" src="assets/images/Lake/Lake_room.png" alt="Calm lake room">
    <img class="lake-flowers-overlay" src="assets/images/Lake/Flowers.png" alt="">
    <div class="caption-box caption-box-two lake-caption is-hidden" aria-live="polite">
      <img class="caption-box-image" src="assets/ui/Caption_Box_2.png" alt="">
      <span></span>
      <button class="pixel-close-button caption-next-button" type="button" aria-label="Next caption"></button>
    </div>
    <div class="caption-box lake-hint-caption is-hidden" aria-live="polite">
      <img class="caption-box-image" src="assets/ui/Caption_Box.png" alt="">
      <span></span>
    </div>
    <div class="text-box lake-dialogue-box is-hidden" aria-live="polite">
      <img class="text-box-image" src="assets/ui/Text_Box.png" alt="">
      <span></span>
      <button class="pixel-close-button text-next-button" type="button" aria-label="Next dialogue"></button>
    </div>
    <button class="lake-frog-button is-hidden" type="button" aria-label="Inspect the frog">
      <img src="assets/images/Lake/Frog_1.png" alt="">
    </button>
  </main>

  <div class="flower-minigame is-hidden" aria-label="Flower mini-game">
    <div class="flower-window">
      <img class="flower-backdrop" src="assets/images/Lake/Flower_minigame/Backdrop_flower.png" alt="">
      <button class="flower-petal-button flower-petal-one" type="button" aria-label="Remove petal">
        <img src="assets/images/Lake/Flower_minigame/Petal.png" alt="">
      </button>
      <button class="flower-petal-button flower-petal-two" type="button" aria-label="Remove petal">
        <img src="assets/images/Lake/Flower_minigame/Petal.png" alt="">
      </button>
      <button class="flower-petal-button flower-petal-three" type="button" aria-label="Remove petal">
        <img src="assets/images/Lake/Flower_minigame/Petal.png" alt="">
      </button>
      <button class="flower-petal-button flower-petal-four" type="button" aria-label="Remove petal">
        <img src="assets/images/Lake/Flower_minigame/Petal.png" alt="">
      </button>
      <button class="flower-petal-button flower-petal-five" type="button" aria-label="Remove petal">
        <img src="assets/images/Lake/Flower_minigame/Petal.png" alt="">
      </button>
      <img class="flower-center" src="assets/images/Lake/Flower_minigame/Flower_center.png" alt="">
    </div>
    <div class="caption-box caption-box-two flower-caption is-hidden" aria-live="polite">
      <img class="caption-box-image" src="assets/ui/Caption_Box_2.png" alt="">
      <span></span>
    </div>
    <div class="caption-box flower-exit-hint is-hidden" aria-live="polite">
      <img class="caption-box-image" src="assets/ui/Caption_Box.png" alt="">
      <span>Pulsa fuera del minijuego para salir.</span>
    </div>
  </div>

  <main class="room-screen is-hidden" data-room="final" aria-label="Secret archive room">
    <div class="room-title">
      <img class="room-title-box" src="assets/ui/Title_Box.png" alt="">
      <span>Registro ???</span>
    </div>
    <div class="final-poem-frame" aria-live="polite">
      <img class="final-poem-image" src="assets/images/Final/Poem.png" alt="">
      <span class="final-poem-text"></span>
    </div>
  </main>

  <div class="tv-minigame is-hidden" aria-label="Old TV mini-game">
    <img class="tv-backdrop" src="assets/images/Billboards/BackdropTV.png" alt="">
    <button class="tv-smack-button" type="button" aria-label="Smack the TV">
      <img class="tv-frame" src="assets/images/Billboards/TV_1_1.png" alt="">
    </button>
    <div class="caption-box tv-exit-hint is-hidden" aria-live="polite">
      <img class="caption-box-image" src="assets/ui/Caption_Box.png" alt="">
      <span>Pulsa fuera del minijuego para salir.</span>
    </div>
  </div>
  </div>

  <script src="scenes/entry.js"></script>
  <script src="scenes/hub.js"></script>
  <script src="scenes/billboards.js"></script>
  <script src="scenes/diner.js"></script>
  <script src="scenes/lake.js"></script>
  <script src="scenes/final.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
